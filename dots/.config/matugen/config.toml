[config]

[config.wallpaper]
set = true
command = 'waypaper --wallpaper "{{ image }}"'

[templates.hypr]
input_path = '~/.config/matugen/hypr/colors.lua'
output_path = '~/.config/hypr/hyprland/colors.lua'

[templates.wayle]
input_path = '~/.config/matugen/wayle/colors.toml'
output_path = '~/.config/wayle/matugen/colors.toml'

[templates.ghostty]
input_path = '~/.config/matugen/ghostty/colors.ghostty'
output_path = '~/.config/ghostty/themes/Matugen'
post_hook = 'pkill -SIGUSR2 ghostty'

[templates.tmux]
input_path = '~/.config/matugen/tmux/colors.conf'
output_path = '~/.config/tmux/colors.conf'
post_hook = 'tmux source-file ~/.config/tmux/tmux.conf'

[templates.nvim]
input_path = '~/.config/matugen/nvim/colors.json'
output_path = '~/.local/share/dotfiles/nvim/colors.json'
post_hook = 'pkill -SIGUSR1 nvim'

[templates.gtk3]
input_path = '~/.config/matugen/gtk-3.0/gtk.css'
output_path = '~/.config/gtk-3.0/gtk.css'

[templates.gtk4]
input_path = '~/.config/matugen/gtk-4.0/gtk.css'
output_path = '~/.config/gtk-4.0/gtk.css'
post_hook = "gsettings set org.gnome.desktop.interface color-scheme prefer-dark"

[templates.rofi]
input_path = '~/.config/matugen/rofi/colors.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.quickshell]
input_path = '~/.config/matugen/quickshell/Colors.qml'
output_path = '~/.config/quickshell/dotshell/modules/config/Colors.qml'
post_hook = 'pkill -9 qs && qs -c dotshell'

